version: "3.9"

services:
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: network-monitor
    ports:
      - "3000:3000"
    volumes:
      - monitor_data:/data
    cap_add:
      # Required for unprivileged ICMP ping (raw sockets)
      - NET_RAW
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  monitor_data:
    driver: local
